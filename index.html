<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ultra Miami 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#060608;--surface:#0e0e14;--border:#1e1e2e;--accent:#a855f7;--adim:rgba(168,85,247,.15);--green:#22c55e;--orange:#f97316;--muted:#4a4a6a;--dim:#777;}
body{margin:0;background:var(--bg);color:#fff;font-family:"Rajdhani",sans-serif;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:4px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(168,85,247,.5)}50%{box-shadow:0 0 0 8px rgba(168,85,247,0)}}
@keyframes winner{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
.title{font-family:"Orbitron",sans-serif;font-weight:900;font-size:clamp(20px,5vw,34px);background:linear-gradient(135deg,#00d4ff,#a855f7,#ff2d95);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0;letter-spacing:2px;}
.btn{font-family:"Rajdhani",sans-serif;font-weight:700;font-size:13px;border-radius:8px;border:2px solid var(--border);background:rgba(255,255,255,.03);color:var(--dim);cursor:pointer;padding:8px 16px;letter-spacing:1px;transition:all .15s;user-select:none;-webkit-user-select:none;}
.btn:hover{color:#aaa;border-color:#333;}.btn:disabled{opacity:.3;cursor:default;}
.btn.primary{border-color:var(--accent);background:var(--adim);color:#d8b4fe;}
.btn.green{border-color:var(--green);background:rgba(34,197,94,.1);color:#86efac;}
.btn.danger{border-color:#771111;background:rgba(255,40,40,.06);color:#f87171;}
.screen{display:none;}.screen.active{display:block;animation:fadeUp .22s ease;}
/* HOME */
#home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px 16px;}
.sub{font-weight:700;font-size:12px;letter-spacing:3px;color:var(--muted);margin-top:4px;text-align:center;}
.name-inp{background:rgba(255,255,255,.05);border:2px solid #2a2a3a;border-radius:10px;color:#fff;font-family:"Rajdhani",sans-serif;font-size:20px;font-weight:700;padding:13px 20px;text-align:center;outline:none;letter-spacing:1px;width:100%;max-width:300px;transition:border-color .2s;}
.name-inp:focus{border-color:var(--accent);}.name-inp::placeholder{color:#252535;}
.hactions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;}
.chip{padding:5px 14px;border-radius:20px;background:var(--adim);border:1px solid rgba(168,85,247,.3);color:#d8b4fe;font-family:"Rajdhani",sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;}
.chip:hover,.chip.on{background:rgba(168,85,247,.3);}
/* SCREEN HEADER */
.shdr{padding:14px 12px 10px;position:sticky;top:0;background:var(--bg);z-index:20;border-bottom:1px solid var(--border);}
.hrow{display:flex;align-items:center;gap:8px;}
.hctr{flex:1;text-align:center;}
.htitle{font-family:"Orbitron",sans-serif;font-weight:900;font-size:14px;letter-spacing:2px;background:linear-gradient(135deg,#00d4ff,#a855f7,#ff2d95);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px;}
/* BELI */
.bprog{height:3px;background:#161620;border-radius:2px;margin-top:10px;overflow:hidden;}
.bprog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#a855f7,#ff2d95);transition:width .35s ease;}
.barena{display:flex;align-items:stretch;justify-content:center;min-height:calc(100vh - 175px);padding:14px 6px;}
.bside{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:10px 5px;border-radius:14px;cursor:pointer;transition:background .12s;border:2px solid transparent;max-width:185px;}
.bside:active{background:rgba(255,255,255,.04);}
.bcard{width:100%;max-width:150px;border-radius:12px;overflow:hidden;border:2px solid var(--border);background:var(--surface);box-shadow:0 4px 20px rgba(0,0,0,.4);transition:transform .15s,border-color .15s;}
.bside:hover .bcard{transform:translateY(-3px);border-color:#2e2e42;}
.bavatar{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-family:"Orbitron",sans-serif;font-weight:900;font-size:clamp(22px,7vw,36px);color:rgba(255,255,255,.88);}
.bbody{padding:10px 10px 12px;}
.bname{font-weight:700;font-size:14px;line-height:1.2;margin-bottom:4px;}
.bstage{font-size:11px;color:var(--muted);}
.btime{font-size:13px;color:var(--accent);font-weight:700;margin-top:2px;}
.bvs{width:40px;min-width:40px;display:flex;align-items:center;justify-content:center;font-family:"Orbitron",sans-serif;font-weight:900;font-size:17px;color:var(--muted);align-self:center;}
.bfoot{display:flex;justify-content:center;gap:10px;padding:0 12px 20px;}
.wflash{animation:winner .32s ease;}
/* TIER LIST */
.twrap{max-width:960px;margin:12px auto;padding:0 10px;}
.trow{display:flex;margin-bottom:4px;border-radius:8px;overflow:hidden;border:1px solid var(--border);min-height:72px;transition:all .15s;}
.trow.dtarget{border-color:var(--accent);background:rgba(168,85,247,.07);}
.tlbl{width:48px;min-width:48px;display:flex;align-items:center;justify-content:center;font-family:"Orbitron",sans-serif;font-weight:900;font-size:22px;color:#000;position:relative;flex-shrink:0;}
.tlbl .ganim{position:absolute;inset:0;background:rgba(255,255,255,.15);animation:glow 1.3s ease-in-out infinite;}
.tcontent{flex:1;display:flex;flex-wrap:wrap;align-items:flex-start;align-content:flex-start;gap:5px;padding:6px;min-height:62px;}
.tempty{width:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:2px;animation:glow 1.5s ease-in-out infinite;}
.ubox{max-width:960px;margin:12px auto;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.01);transition:all .15s;}
.ubox.dtarget{border-color:rgba(168,85,247,.5);background:rgba(168,85,247,.06);}
.uhdr{padding:8px 14px;border-bottom:1px solid var(--border);font-weight:700;font-size:11px;color:var(--muted);letter-spacing:2px;display:flex;justify-content:space-between;}
.ucontent{display:flex;flex-wrap:wrap;gap:5px;padding:10px;min-height:80px;}
/* Artist chip */
.ac{display:flex;flex-direction:column;align-items:center;width:74px;cursor:pointer;user-select:none;-webkit-user-select:none;border-radius:8px;padding:4px 3px;transition:opacity .15s,transform .12s;}
.ac:hover{background:rgba(255,255,255,.05);}.ac.dimmed{opacity:.2;}.ac.sel{transform:scale(1.07);}
.aicon{width:54px;height:54px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:"Orbitron",sans-serif;font-weight:700;font-size:13px;color:rgba(255,255,255,.88);box-shadow:0 2px 8px rgba(0,0,0,.4);border:1.5px solid rgba(255,255,255,.07);letter-spacing:.5px;transition:all .15s;}
.ac.sel .aicon{border:2px solid var(--accent);box-shadow:0 0 0 2px var(--accent),0 0 14px rgba(168,85,247,.5);animation:pulse 1.4s ease-in-out infinite;}
.aname{font-size:8.5px;font-weight:700;color:var(--dim);text-align:center;margin-top:3px;line-height:1.1;max-width:74px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.ac.sel .aname{color:#d8b4fe;}
.atime{font-size:8px;color:var(--accent);font-weight:700;margin-top:2px;}
.astage{font-size:7px;color:#2a3a50;font-weight:600;margin-top:1px;text-align:center;max-width:74px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.cbar{position:fixed;bottom:0;left:0;right:0;padding:14px 20px;background:linear-gradient(to top,var(--bg) 60%,transparent);display:flex;justify-content:center;z-index:50;}
/* PLAN */
.pwrap{max-width:700px;margin:0 auto;padding:16px 12px 60px;}
.psum{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.pstat{padding:10px 16px;border-radius:8px;font-weight:700;font-size:12px;letter-spacing:1px;flex:1;min-width:110px;text-align:center;border:1px solid;}
.slbl{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--muted);margin:0 0 8px 2px;}
.pslot{display:flex;gap:12px;padding:12px 14px;border-radius:8px;margin-bottom:6px;border:1px solid var(--border);background:rgba(255,255,255,.02);animation:fadeUp .3s ease both;position:relative;overflow:hidden;}
.pslot::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;}
.pslot.conf{border-color:rgba(249,115,22,.25);}
.pslot.conf::before{background:var(--orange);}
.ptime{font-family:"Orbitron",sans-serif;font-size:11px;font-weight:700;color:var(--muted);min-width:58px;padding-top:2px;flex-shrink:0;}
.pinfo{flex:1;min-width:0;}
.partist{font-weight:700;font-size:16px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.pstage{font-size:11px;color:var(--muted);margin-top:3px;}
.puntil{font-size:10px;color:#333;}
.tpip{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:5px;font-family:"Orbitron",sans-serif;font-size:11px;font-weight:900;color:#000;flex-shrink:0;}
.ctag{font-size:10px;font-weight:700;color:var(--orange);background:rgba(249,115,22,.1);padding:2px 8px;border-radius:4px;display:inline-block;margin-top:5px;}
/* COMPARE */
.cwrap{max-width:960px;margin:0 auto;padding:12px;}
.ccol{flex:1;min-width:0;}
.ccolhd{font-weight:700;font-size:12px;letter-spacing:1px;text-align:center;padding:6px;border-bottom:1px solid var(--border);color:var(--dim);margin-bottom:6px;}
.crow{display:flex;margin-bottom:3px;border-radius:6px;overflow:hidden;border:1px solid var(--border);min-height:40px;}
.clbl{width:30px;min-width:30px;display:flex;align-items:center;justify-content:center;font-family:"Orbitron",sans-serif;font-weight:900;font-size:14px;color:#000;}
.ccnt{flex:1;display:flex;flex-wrap:wrap;gap:3px;padding:4px;}
.cchip{width:38px;display:flex;flex-direction:column;align-items:center;}
.cicon{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:"Orbitron",sans-serif;font-weight:700;font-size:9px;color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.07);}
.cicon.match{outline:2px solid var(--green);outline-offset:-1px;}
.cname{font-size:6px;font-weight:700;color:#555;text-align:center;margin-top:1px;max-width:38px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
</style>
</head>
<body>

<div id="home" class="screen active">

  <div class="hactions">

    <div id="savedChips" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;"></div>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;">
      <button class="btn green" id="planBtn" style="display:none;">&#128506; GAME PLAN</button>
      <button class="btn primary" id="cmpBtn" style="display:none;">&#9876; COMPARE</button>
    </div>
  </div>
</div>

<div id="beli" class="screen">
  <div class="shdr">
    <div class="hrow">
      <button class="btn" id="beliBack" style="padding:6px 12px;font-size:12px;">&larr;</button>
      <div class="hctr"><span class="htitle">QUICK PICK</span><span id="beliCtr" style="font-size:11px;color:var(--muted);margin-left:8px;"></span></div>
      <button class="btn green" id="beliDone" style="padding:6px 12px;font-size:12px;">DONE &#10003;</button>
    </div>

    <div class="bprog"><div class="bprog-fill" id="beliProg" style="width:0%"></div></div>
  </div>
  <div class="barena" id="barena">
    <div class="bside" id="bleft"><div class="bcard" id="bcardL"></div><div style="font-size:11px;color:var(--muted);letter-spacing:1px;font-weight:700;">TAP TO PICK</div></div>
    <div class="bvs">VS</div>
    <div class="bside" id="bright"><div class="bcard" id="bcardR"></div><div style="font-size:11px;color:var(--muted);letter-spacing:1px;font-weight:700;">TAP TO PICK</div></div>
  </div>
  <div class="bfoot">
    <button class="btn" id="beliSkip" style="padding:8px 22px;">Skip / Tie</button>
    <button class="btn" id="beliSwitch" style="padding:8px 14px;font-size:11px;">Tier List &#8594;</button>
  </div>
</div>

<div id="tier" class="screen">
  <div class="shdr">
    <div class="hrow">
      <button class="btn" id="tierBack" style="padding:6px 12px;font-size:12px;">&larr;</button>
      <div class="hctr"><span class="htitle">TIER LIST</span><span id="tierUser" style="font-size:11px;color:var(--accent);margin-left:8px;"></span></div>
      <button class="btn green" id="tierSave" style="padding:6px 12px;font-size:12px;">SAVE &#10003;</button>
    </div>
    <div class="tabs" id="tierDayTabs"></div>
  </div>
  <div class="twrap" id="twrap"></div>
  <div class="ubox" id="ubox"><div class="uhdr"><span>UNRANKED</span><span id="ucnt"></span></div><div class="ucontent" id="ucontent"></div></div>
  <div class="cbar" id="cbar" style="display:none;"><button class="btn danger" id="cancelSel" style="padding:10px 36px;font-size:14px;">&#10005; CANCEL</button></div>
</div>

<div id="plan" class="screen">
  <div class="shdr">
    <div class="hrow" style="justify-content:center;gap:10px;">
      <button class="btn" id="planBack" style="padding:6px 12px;font-size:12px;">&larr;</button>
      <h1 class="title" style="font-size:22px;">GAME PLAN</h1>
    </div>
    <div class="tabs" id="planDayTabs"></div>
    <div class="tabs" id="planTF"></div>
  </div>
  <div class="pwrap" id="pwrap"></div>
</div>

<div id="cmp" class="screen">
  <div class="shdr">
    <div class="hrow">
      <button class="btn" id="cmpBack" style="padding:6px 12px;font-size:12px;">&larr;</button>
      <div class="hctr"><span class="htitle">COMPARE</span></div>
    </div>
    <div class="tabs" id="cmpDayTabs"></div>
  </div>
  <div class="cwrap" id="cwrap"></div>
</div>

const AR={};
DK.forEach(d=>{const seen=new Set();AR[d]=[];ST[d].forEach(({a})=>{if(!seen.has(a)){seen.add(a);AR[d].push(a);}});});
function gs(day,a){return ST[day].find(s=>s.a===a);}
function c1(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return"hsl("+Math.abs(h)%360+",62%,30%)";}
function c2(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return"hsl("+(Math.abs(h)+130)%360+",55%,38%)";}
function ini(n){return n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function fmt(m){const h=Math.floor(m/60)%24,mn=m%60,ap=h>=12?"PM":"AM";return(h>12?h-12:h||12)+":"+(mn+"").padStart(2,"0")+" "+ap;}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function $(i){return document.getElementById(i);}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));$(id).classList.add("active");window.scrollTo(0,0);}

function freshT(){const t={};DK.forEach(d=>{t[d]={};TIDS.forEach(id=>t[d][id]=[]);t[d].u=[...AR[d]];});return t;}

  $("startTier").onclick=goTier;$("startBeli").onclick=goBeli;

function refreshHome(){
  const has=!!S.nm;
  $("startTier").disabled=!has;$("startBeli").style.display=has?"block":"none";
  const ns=Object.keys(S.saved);
  if(ns.length){
    $("savedSec").style.display="block";

    $("planBtn").style.display="block";$("cmpBtn").style.display=ns.length>=2?"block":"none";
  }else{$("savedSec").style.display="none";}
}
function goTier(){if(!S.nm)return;S.ad="friday";S.sel=null;show("tier");renderTier();}

// BELI
function initBQ(d){const arr=[...AR[d]].sort(()=>Math.random()-.5);const p=[];for(let i=0;i<arr.length-1;i+=2)p.push([arr[i],arr[i+1]]);if(arr.length%2)p.push([arr[arr.length-1],arr[Math.floor(Math.random()*(arr.length-1))]]);S.bq=p;S.bi=0;if(!S.bs[d]){S.bs[d]={};AR[d].forEach(a=>S.bs[d][a]=0);}}
function renderBeli(){
  const d=S.bd,q=S.bq,i=S.bi;
  $("beliDayTabs").innerHTML=DK.map(k=>`<button class="btn${k===d?" primary":""}" onclick="S.bd='${k}';initBQ('${k}');renderBeli()" style="padding:5px 10px;font-size:12px;">${DL[k]}</button>`).join("");
  $("beliBack").onclick=()=>{show("home");renderHome();};
  $("beliDone").onclick=()=>{applyBeli(d);S.ad=d;show("tier");renderTier();};
  $("beliSkip").onclick=()=>{S.bi++;renderBeli();};
  $("beliSwitch").onclick=()=>{show("tier");renderTier();};
  if(i>=q.length){
    applyBeli(d);
    $("barena").innerHTML=`<div style="text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;"><div style="font-size:48px;">&#127881;</div><div style="font-family:Orbitron,sans-serif;font-weight:900;font-size:18px;letter-spacing:2px;color:#d8b4fe;">${DL[d]} RANKED!</div><button class="btn primary" style="padding:10px 24px;margin-top:8px;" onclick="S.ad='${d}';show('tier');renderTier()">View Tier List &rarr;</button></div>`;
    $("beliProg").style.width="100%";$("beliCtr").textContent="Done!";return;
  }
  const[a,b]=q[i];
  $("beliProg").style.width=Math.round((i/q.length)*100)+"%";$("beliCtr").textContent=(i+1)+" / "+q.length;
  $("bcardL").innerHTML=bcard(a,d);$("bcardR").innerHTML=bcard(b,d);
  $("bleft").className="bside";$("bright").className="bside";
  $("bleft").onclick=()=>bpick(a,b,d,"bleft");$("bright").onclick=()=>bpick(b,a,d,"bright");
}
function bcard(a,d){const s=gs(d,a);return`<div class="bavatar" style="background:linear-gradient(135deg,${c1(a)},${c2(a)})">${ini(a)}</div><div class="bbody"><div class="bname">${esc(a)}</div><div class="bstage">${s?esc(s.s):"–"}</div><div class="btime">${s?fmt(s.t):"TBA"}</div></div>`;}
function bpick(w,l,d,side){S.bs[d][w]=(S.bs[d][w]||0)+2;$(side).classList.add("wflash");setTimeout(()=>{S.bi++;renderBeli();},220);}
function applyBeli(d){const sc=S.bs[d];if(!sc)return;const sorted=[...AR[d]].sort((a,b)=>(sc[b]||0)-(sc[a]||0));const tot=sorted.length,pct=[.05,.10,.15,.20,.20];let cur=0;TIDS.forEach((tid,i)=>{const cnt=i<TIDS.length-1?Math.max(1,Math.ceil(tot*pct[i])):tot-cur;S.T[d][tid]=sorted.slice(cur,cur+cnt);cur+=cnt;});S.T[d].u=[];}

function renderTier(){

  renderTRows();$("cancelSel").onclick=()=>{S.sel=null;renderTRows();};
}
function renderTRows(){
  const d=S.ad,ct=S.T[d],sel=S.sel,hs=!!sel;
  const w=$("twrap");w.innerHTML="";
  TIERS.forEach(tier=>{
    const isTgt=hs&&sel.f!==tier.id;
    const row=document.createElement("div");row.className="trow"+(isTgt?" dtarget":"");
    row.innerHTML=`<div class="tlbl" style="background:${tier.c}">${tier.id}${isTgt?'<div class="ganim"></div>':""}</div><div class="tcontent" id="tc_${tier.id}"></div>`;
    if(isTgt)row.onclick=()=>mvTo(tier.id);
    w.appendChild(row);
    const tc=row.querySelector(".tcontent");
    if(!ct[tier.id].length&&isTgt)tc.innerHTML=`<div class="tempty" style="color:${tier.c}55">DROP HERE</div>`;
    ct[tier.id].forEach(a=>tc.appendChild(mkChip(a,tier.id,hs,d)));
  });
  const uTgt=hs&&sel.f!=="u";
  $("ubox").className="ubox"+(uTgt?" dtarget":"");$("ucnt").textContent=ct.u.length+" artists";
  const uc=$("ucontent");uc.innerHTML="";ct.u.forEach(a=>uc.appendChild(mkChip(a,"u",hs,d)));
  if(uTgt)$("ubox").onclick=()=>mvTo("u");else $("ubox").onclick=null;
  $("cbar").style.display=hs?"flex":"none";
}
function mkChip(name,from,hs,d){
  const isSel=S.sel&&S.sel.a===name&&S.sel.f===from,dim=hs&&!isSel,s=gs(d,name);
  const el=document.createElement("div");el.className="ac"+(isSel?" sel":"")+(dim?" dimmed":"");
  el.innerHTML=`<div class="aicon" style="background:linear-gradient(135deg,${c1(name)},${c2(name)})">${ini(name)}</div><div class="aname">${esc(name)}</div><div class="atime">${s?fmt(s.t):"–"}</div><div class="astage">${s?esc(s.s):""}</div>`;
  el.onclick=e=>{e.stopPropagation();S.sel=(isSel?null:{a:name,f:from});renderTRows();};
  return el;
}
function mvTo(tgt){if(!S.sel)return;const d=S.ad,ct=S.T[d];if(S.sel.f==="u")ct.u=ct.u.filter(a=>a!==S.sel.a);else ct[S.sel.f]=ct[S.sel.f].filter(a=>a!==S.sel.a);if(tgt==="u")ct.u.push(S.sel.a);else ct[tgt].push(S.sel.a);S.sel=null;renderTRows();}

// PLAN
function buildPlan(user,day,tf){
  const ut=S.saved[user]?.[day];if(!ut)return[];
  const cands=[];
  tf.forEach(tid=>(ut[tid]||[]).forEach(artist=>ST[day].filter(s=>s.a===artist).forEach(slot=>cands.push({...slot,artist,tier:tid}))));
  cands.sort((a,b)=>a.t-b.t||TR[a.tier]-TR[b.tier]);
  const chosen=[];
  return cands.map(slot=>{const bl=chosen.find(c=>c.t<slot.e&&slot.t<c.e);if(!bl){slot._c=true;chosen.push(slot);}else{slot._c=false;slot._cf=bl.artist;}return slot;});
}
function renderPlan(){
  $("planBack").onclick=()=>{show("home");renderHome();};
  $("planDayTabs").innerHTML=DK.map(k=>`<button class="btn${k===S.gd?" primary":""}" onclick="S.gd='${k}';renderPBody()" style="padding:6px 12px;">${DL[k]}</button>`).join("");
  $("planTF").innerHTML=TIERS.map(t=>{const on=S.gf.includes(t.id);return`<button class="btn" style="${on?"background:"+t.c+";border-color:"+t.c+";color:#000":"border-color:"+t.c+"55;color:"+t.c}" onclick="tgf('${t.id}')">${t.id}</button>`;}).join("");
  renderPBody();
}
function tgf(t){if(S.gf.includes(t)){if(S.gf.length>1)S.gf=S.gf.filter(x=>x!==t);}else S.gf=[...S.gf,t];renderPlan();}
function renderPBody(){
  const ns=Object.keys(S.saved),wrap=$("pwrap");
  if(!ns.length){wrap.innerHTML=`<div style="text-align:center;color:var(--muted);padding:40px;font-size:13px;letter-spacing:1px;">SAVE YOUR TIER LIST FIRST</div>`;return;}
  const user=S.saved[S.nm]?S.nm:ns[0],plan=buildPlan(user,S.gd,S.gf);
  const ok=plan.filter(p=>p._c),cf=plan.filter(p=>!p._c);
  let h=`<div style="font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:16px;text-align:center;">${esc(user.toUpperCase())} &middot; ${DL[S.gd]}</div>`;
  h+=`<div class="psum"><div class="pstat" style="background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.3);color:#86efac;">&#10003; ${ok.length} SETS</div>${cf.length?`<div class="pstat" style="background:rgba(249,115,22,.07);border-color:rgba(249,115,22,.3);color:#fb923c;">&#9889; ${cf.length} CONFLICTS</div>`:""}</div>`;
  if(!plan.length){h+=`<div style="text-align:center;color:var(--muted);padding:30px;font-size:13px;">RANK ARTISTS IN SELECTED TIERS FIRST</div>`;wrap.innerHTML=h;return;}
  h+=`<div class="slbl">YOUR SCHEDULE</div>`;
  ok.sort((a,b)=>a.t-b.t).forEach((sl,i)=>{const tr=TIERS.find(t=>t.id===sl.tier);h+=`<div class="pslot" style="animation-delay:${i*.04}s"><div class="ptime">${fmt(sl.t)}</div><div class="pinfo"><div class="partist"><span class="tpip" style="background:${tr.c}">${sl.tier}</span>${esc(sl.a)}</div><div class="pstage">${esc(sl.s)}</div><div class="puntil">Until ${fmt(sl.e)}</div></div></div>`;});
  if(cf.length){h+=`<div class="slbl" style="margin-top:20px;color:var(--orange);">&#9889; CONFLICTS &mdash; TOUGH CHOICES</div>`;cf.sort((a,b)=>a.t-b.t).forEach((sl,i)=>{const tr=TIERS.find(t=>t.id===sl.tier);h+=`<div class="pslot conf" style="animation-delay:${(ok.length+i)*.04}s"><div class="ptime" style="color:#f9731655">${fmt(sl.t)}</div><div class="pinfo"><div class="partist" style="opacity:.6"><span class="tpip" style="background:${tr.c}">${sl.tier}</span>${esc(sl.a)}</div><div class="pstage">${esc(sl.s)}</div><div class="ctag">&#9889; overlaps with ${esc(sl._cf||"another pick")}</div></div></div>`;});}
  wrap.innerHTML=h;
}

// COMPARE
function renderCmp(){
  $("cmpBack").onclick=()=>{show("home");renderHome();};
  $("cmpDayTabs").innerHTML=DK.map(k=>`<button class="btn${k===S.cd?" primary":""}" onclick="S.cd='${k}';renderCBody()" style="padding:6px 12px;">${DL[k]}</button>`).join("");
  renderCBody();
}
function renderCBody(){
  const ns=Object.keys(S.saved),wrap=$("cwrap");
  if(ns.length<2){wrap.innerHTML=`<p style="text-align:center;color:var(--muted);padding:30px;">Need 2+ saved rankings to compare</p>`;return;}
  const[u1,u2]=ns,t1=S.saved[u1][S.cd],t2=S.saved[u2][S.cd],m1={},m2={};
  [...TIDS,"u"].forEach(tid=>{(t1[tid]||[]).forEach(a=>m1[a]=tid);(t2[tid]||[]).forEach(a=>m2[a]=tid);});
  let h=`<div style="display:flex;gap:8px;margin-bottom:8px;"><div class="ccol"><div class="ccolhd">${esc(u1.toUpperCase())}</div></div><div class="ccol"><div class="ccolhd">${esc(u2.toUpperCase())}</div></div></div>`;
  TIERS.forEach(tier=>{
    h+=`<div style="display:flex;gap:8px;margin-bottom:3px;">`;
    [[u1,m2],[u2,m1]].forEach(([u,om])=>{const ct=S.saved[u][S.cd];h+=`<div class="ccol"><div class="crow"><div class="clbl" style="background:${tier.c}">${tier.id}</div><div class="ccnt">`;(ct[tier.id]||[]).forEach(a=>{h+=`<div class="cchip"><div class="cicon${om[a]===tier.id?" match":""}" style="background:linear-gradient(135deg,${c1(a)},${c2(a)})">${ini(a)}</div><div class="cname">${esc(a)}</div></div>`;});h+=`</div></div></div>`;});
    h+=`</div>`;
  });
  wrap.innerHTML=h;
}

renderHome();
</script>
